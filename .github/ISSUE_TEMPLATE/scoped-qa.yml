name: Scoped CSV importer QA request
description: Ask whether one existing USD stock or ETF CSV importer fits the fixed-scope QA pilot.
title: "[QA request] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Share only public or synthetic information here. Do not post source code, credentials, account identifiers, execution data, or production statements.
  - type: input
    id: broker_export
    attributes:
      label: Broker and export/report name
      description: A public product name is enough for the initial fit check.
      placeholder: Example Broker — Executions CSV
    validations:
      required: true
  - type: textarea
    id: headers
    attributes:
      label: Header row only
      description: Paste column names without any execution or account rows.
      render: text
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Known failure mode or expected QA goal
      description: Describe behavior without including private data or repository details.
    validations:
      required: true
  - type: dropdown
    id: observation_path
    attributes:
      label: Available observation path
      options:
        - Runnable repository or build can be shared privately later
        - Staging importer can be used without production access
        - Client can run synthetic fixtures and return unedited outputs
        - Not sure yet
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I have not included credentials, personal data, account data, production statements, or private source code in this public issue.
          required: true
